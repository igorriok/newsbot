agents:
  classifier:
    model: default
    instructions: |
      You are a relevance classifier. Given an article and a list of topics, determine which topics the article is relevant to.
      Respond with strict JSON only — no markdown, no code fences, no extra text.
      Format: {"matches": [{"topic_id": <int>, "relevant": <bool>, "score": <0.0-1.0>, "reason": "<brief explanation>"}]}
    tools: []
